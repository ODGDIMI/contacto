<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b1f3a">
  <meta name="description" content="Contacto institucional de la Dirección de Inteligencia del Ministerio del Interior">
  <title>Dirección de Inteligencia | Ministerio del Interior</title>
  <style>
    :root {
      --azul: #0b1f3a;
      --azul-claro: #163f72;
      --dorado: #b8923b;
      --fondo: #f3f5f8;
      --texto: #17202a;
      --gris: #68717d;
      --blanco: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--azul) 0 210px, var(--fondo) 210px 100%);
      color: var(--texto);
      padding: 28px 16px;
    }

    .tarjeta {
      width: min(100%, 430px);
      margin: 0 auto;
      background: var(--blanco);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
      border-top: 5px solid var(--dorado);
    }

    .encabezado {
      padding: 25px 24px 20px;
      text-align: center;
    }

    .logo {
      display: block;
      width: 100%;
      max-width: 360px;
      height: auto;
      margin: 0 auto 22px;
    }

    h1 {
      margin: 0;
      color: var(--azul);
      font-size: 24px;
      line-height: 1.16;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .departamento {
      margin: 10px auto 0;
      max-width: 350px;
      color: var(--gris);
      font-size: 15px;
      line-height: 1.45;
      font-weight: 600;
    }

    .separador {
      width: 68px;
      height: 3px;
      margin: 20px auto 0;
      background: var(--dorado);
      border-radius: 10px;
    }

    .acciones {
      display: grid;
      gap: 12px;
      padding: 4px 24px 24px;
    }

    .boton {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 62px;
      padding: 12px 16px;
      text-decoration: none;
      color: var(--azul);
      background: #f8fafc;
      border: 1px solid #dce2e9;
      border-radius: 14px;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .boton:hover,
    .boton:focus {
      transform: translateY(-1px);
      box-shadow: 0 7px 18px rgba(11, 31, 58, 0.11);
      border-color: var(--dorado);
      outline: none;
    }

    .icono {
      display: grid;
      place-items: center;
      flex: 0 0 42px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--azul);
      color: var(--blanco);
      font-size: 21px;
    }

    .texto-boton strong {
      display: block;
      font-size: 16px;
      margin-bottom: 3px;
    }

    .texto-boton span {
      display: block;
      color: var(--gris);
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .direccion {
      margin: 0 24px 24px;
      padding: 16px;
      text-align: center;
      background: #f4f0e6;
      border-radius: 14px;
      color: var(--azul);
      font-size: 14px;
      line-height: 1.55;
    }

    footer {
      padding: 16px 20px 18px;
      text-align: center;
      color: #e8edf4;
      background: var(--azul);
      font-size: 12px;
      line-height: 1.5;
    }

    footer strong {
      color: var(--blanco);
    }

    @media (max-width: 360px) {
      body { padding: 16px 10px; }
      .encabezado, .acciones { padding-left: 18px; padding-right: 18px; }
      .direccion { margin-left: 18px; margin-right: 18px; }
      h1 { font-size: 21px; }
    }
  </style>
</head>
