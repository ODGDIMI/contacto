<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b1f3a">
  <meta name="description" content="Contacto institucional de la Dirección de Inteligencia del Ministerio del Interior">
  <title>Dirección de Inteligencia</title>

  <style>
    :root {
      --azul: #0b1f3a;
      --azul-2: #14375f;
      --dorado: #b88a27;
      --dorado-suave: #e6d2a6;
      --fondo: #edf2f7;
      --blanco: #ffffff;
      --texto: #122033;
      --gris: #66717f;
      --borde: #dbe2ea;
      --arena: #f7f0e4;
    }

    * { box-sizing: border-box; }

    html { background: var(--fondo); }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px 14px;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      color: var(--texto);
      background: linear-gradient(180deg, var(--azul) 0 245px, var(--fondo) 245px 100%);
    }

    .tarjeta {
      width: min(100%, 560px);
      margin: 0 auto;
      overflow: hidden;
      background: var(--blanco);
      border-radius: 28px;
      border-top: 5px solid var(--dorado);
      box-shadow: 0 24px 58px rgba(7, 26, 50, .22);
    }

    .cabecera {
      padding: 28px 30px 20px;
      text-align: center;
    }

    .marcas {
      display: grid;
      grid-template-columns: 118px minmax(0, 1fr);
      align-items: center;
      gap: 24px;
      margin-bottom: 28px;
    }

    .logo-dimi {
      width: 118px;
      height: 118px;
      object-fit: contain;
      display: block;
    }

    .logo-ministerio {
      width: 100%;
      max-width: 355px;
      height: 96px;
      object-fit: contain;
      display: block;
      justify-self: center;
    }

    h1 {
      margin: 0;
      color: var(--azul);
      font-size: clamp(28px, 5.3vw, 40px);
      line-height: 1.08;
      letter-spacing: .4px;
      text-transform: uppercase;
      font-weight: 800;
    }

    .departamento {
      margin: 14px auto 0;
      max-width: 470px;
      color: var(--gris);
      font-size: clamp(16px, 3.3vw, 20px);
      line-height: 1.4;
      font-weight: 600;
    }

    .eslogan {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-weight: 600;
      letter-spacing: .6px;
      color: var(--dorado);
    }

    .separador {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 24px auto 0;
    }

    .separador::before,
    .separador::after {
      content: "";
      width: 92px;
      height: 2px;
      background: var(--dorado);
    }

    .rombo {
      width: 11px;
      height: 11px;
      background: var(--dorado);
      transform: rotate(45deg);
    }

    .acciones {
      display: grid;
      gap: 14px;
      padding: 10px 28px 26px;
    }

    .accion {
      display: grid;
      grid-template-columns: 56px 1fr 20px;
      align-items: center;
      gap: 16px;
      min-height: 84px;
      padding: 14px 18px;
      color: var(--azul);
      text-decoration: none;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--borde);
      border-radius: 18px;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .accion:hover,
    .accion:focus {
      transform: translateY(-2px);
      border-color: var(--dorado-suave);
      box-shadow: 0 10px 24px rgba(11,31,58,.10);
      outline: none;
    }

    .icono {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--azul);
      color: white;
    }

    .icono svg {
      width: 29px;
      height: 29px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .accion strong {
      display: block;
      margin-bottom: 4px;
      font-size: 19px;
      line-height: 1.2;
    }

    .accion small {
      display: block;
      color: var(--gris);
      font-size: 14px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .flecha {
      font-size: 28px;
      line-height: 1;
      color: var(--azul);
    }

    .direccion {
      display: grid;
      grid-template-columns: 58px 1fr;
      align-items: center;
      gap: 16px;
      margin: 0 28px 28px;
      padding: 20px 18px;
      color: var(--azul);
      background: var(--arena);
      border: 1px solid #ead8af;
      border-radius: 18px;
    }
.edificio {
  width: 72px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: white;
  color: var(--dorado);
  border: 1px solid #ead8af;
  flex-shrink: 0;
  overflow: hidden;
}
.edificio svg {
  width: 52px;
  height: 52px;
  display: block;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  transform: translate(2px, 2px) scale(1.08);
  transform-origin: center;
}

    .direccion strong {
      display: block;
      margin-bottom: 4px;
      font-size: 18px;
    }

    .direccion span {
      display: block;
      font-size: 14px;
      line-height: 1.45;
    }

    .pie {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 28px;
      min-height: 112px;
      padding: 20px 28px;
      background: #ffffff;
      border-top: 3px solid var(--dorado);
    }

    .logo-gobierno,
    .logo-iso {
      display: block;
      object-fit: contain;
    }

    .logo-gobierno {
      width: 190px;
      height: 64px;
      justify-self: start;
    }

    .logo-iso {
      width: 64px;
      height: 64px;
      justify-self: end;
    }

    @media (max-width: 520px) {
      body {
        padding: 0;
        background: var(--azul);
      }

      .tarjeta {
        min-height: 100vh;
        border-radius: 0;
      }

      .cabecera {
        padding: 24px 18px 18px;
      }

      .marcas {
        grid-template-columns: 94px minmax(0, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }

      .logo-dimi {
        width: 94px;
        height: 94px;
      }

      .logo-ministerio {
        height: 78px;
        max-width: 290px;
      }

      .acciones {
        padding: 8px 16px 22px;
      }

      .direccion {
        margin: 0 16px 22px;
      }

      .pie {
        padding: 18px 20px;
        gap: 20px;
      }

      .logo-gobierno {
        width: 165px;
        height: 58px;
      }

      .logo-iso {
        width: 58px;
        height: 58px;
      }
    }

    @media (max-width: 360px) {
      .marcas {
        grid-template-columns: 82px minmax(0, 1fr);
        gap: 12px;
      }

      .logo-dimi {
        width: 82px;
        height: 82px;
      }

      .logo-ministerio {
        height: 66px;
      }

      .accion {
        grid-template-columns: 50px 1fr 16px;
        gap: 12px;
        padding: 12px 14px;
      }

      .icono {
        width: 50px;
        height: 50px;
      }

      .logo-gobierno {
        width: 145px;
        height: 52px;
      }

      .logo-iso {
        width: 52px;
        height: 52px;
      }
    }
  </style>
</head>
